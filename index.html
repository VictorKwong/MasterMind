<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- setup link css, style1 for level1-->
    <link rel="stylesheet" href="./styles/style.css">
    <title>MiniGame - Master Mind</title>
</head>
<body class="wrapper">
    <section class="headerlayout">
        <h2 class="hword">Mini Master Mind</h2>
        <div class="firstscene">
            <p>Guide: Find the correct answer while attempt the least tries</p>
            <button onclick="myStartGame();" class="firstscenebutton">Start Game</button>
        </div>
    </section>
    <div class="secondscene">
        <form action="" method="GET">
            <fieldset>
                <legend>Find the hidden code</legend>
                <div class="wrapflex">
                    <div class="flexbox">
                        <input type="range" min="0" max="1" value="0" onchange="updateTextInput(this.value,'textInput1');">
                        <input type="text" id="textInput1" value="0" disabled>
                    </div>
                    <div class="flexbox">
                        <input type="range" min="0" max="1" value="0" onchange="updateTextInput(this.value,'textInput2');">
                        <input type="text" id="textInput2" value="0" disabled>
                    </div>
                    <div class="flexbox">
                    <input type="range" min="0" max="1" value="0" onchange="updateTextInput(this.value,'textInput3');">
                    <input type="text" id="textInput3" value="0" disabled>
                    </div>
                    <div class="flexbox">
                    <input type="range" min="0" max="1" value="0" onchange="updateTextInput(this.value,'textInput4');">
                    <input type="text" id="textInput4" value="0" disabled>
                    </div>
                </div>
                <!--the browser will submit the form to the current URL-->
                <div class="headerlayout">
                    <p id="userAnswer">0000</p>
                    <input class="submitlayout" type="submit" value="Submit" onclick="mySubmitFunction(); return false;">
            </fieldset>
        </form>
        <div>
            <p id="correctd"></p>
            <p id="incorrectd"></p>
            <p id="result"></p>
        </div>
    </div>


    <script src='https://code.jquery.com/jquery-3.4.0.min.js' integrity='sha256-BJeo0qm959uMBGb65z40ejJYGSgR7REI4+CW1fNKwOg=' crossorigin='anonymous'></script>
    <script src="js/script.js"></script>
</body>
</html>
