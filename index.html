<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <h1>MasterMind</h1>
        <p>Find the correct answer while attempt the least tries</p>
    </div>
    <div>
        <form action="" method="GET">
            <fieldset>
                <legend>Find the right code</legend>
                <input type="range" min="0" max="1" value="0" onchange="updateTextInput(this.value,'textInput1');">
                <input type="text" id="textInput1" value="0">
                <input type="range" min="0" max="1" value="0" onchange="updateTextInput(this.value,'textInput2');">
                <input type="text" id="textInput2" value="0">
                <input type="range" min="0" max="1" value="0" onchange="updateTextInput(this.value,'textInput3');">
                <input type="text" id="textInput3" value="0">
                <input type="range" min="0" max="1" value="0" onchange="updateTextInput(this.value,'textInput4');">
                <input type="text" id="textInput4" value="0">
                <!--the browser will submit the form to the current URL-->
                <input type="submit" value="Submit" onclick="mySubmitFunction(); return false;">
                <p id="userAnswer">0000</p>
            </fieldset>
        </form>
        <div>
            <p id="correctd"></p>
            <p id="incorrectd"></p>
        </div>
        <div>
            <button onclick="myStartGame();">Start Game</button>
        </div>
    </div>


    <script src='https://code.jquery.com/jquery-3.4.0.min.js' integrity='sha256-BJeo0qm959uMBGb65z40ejJYGSgR7REI4+CW1fNKwOg=' crossorigin='anonymous'></script>
    <script src="js/script.js"></script>
</body>
</html>
